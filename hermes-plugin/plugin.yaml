name: pumpup
label: Pump Up
kind: standalone
version: 0.1.0
description: >
  Request human approvals/elicitations from Pump Up and resume the agent's original
  conversation when a human decides. Provides seven pumpup_* tools plus a background
  "pumpup" gateway platform that polls Pump Up for decisions and resumes the origin
  session via the API server. Requires an always-on gateway with the API server enabled.
author: Applet Labs Inc. (dba Pump Up)
provides_tools:
  - pumpup_request_approval
  - pumpup_request_elicitation
  - pumpup_record_action
  - pumpup_report_exception
  - pumpup_add_note
  - pumpup_get_decision
  - pumpup_guide
requires_env:
  - name: PUMPUP_BASE_URL
    description: "Pump Up agent API base URL"
    prompt: "Pump Up base URL"
    password: false
  - name: PUMPUP_API_KEY
    description: "Pump Up agent API key"
    prompt: "Pump Up API key"
    password: true
optional_env:
  - name: PUMPUP_POLL_INTERVAL_SEC
    description: "Decision poll interval in seconds (default 30 — HITL is hours)"
    prompt: "Poll interval (s)"
    password: false
